const rand   = (a,b) => Math.random()*(b-a)+a;
const randInt= (a,b) => Math.floor(rand(a,b+1));
const dist   = (a,b) => Math.hypot(a.x-b.x, a.y-b.y);
const norm   = (dx,dy) => { const l=Math.hypot(dx,dy)||1; return {x:dx/l,y:dy/l}; };
const lerp   = (a,b,t) => a+(b-a)*t;
const clamp  = (v,a,b) => Math.max(a,Math.min(b,v));
function shuffle(arr){for(let i=arr.length-1;i>0;i--){const j=randInt(0,i);[arr[i],arr[j]]=[arr[j],arr[i]];} return arr;}

};
function loadCharImg(key,src){
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const oc = document.createElement('canvas');
    oc.width = img.width||128; oc.height = img.height||128;
    const octx = oc.getContext('2d');
    octx.drawImage(img,0,0);
    try {
      const id = octx.getImageData(0,0,oc.width,oc.height);
      const d = id.data;
      for(let i=0;i<d.length;i+=4){
        if(d[i]<25 && d[i+1]<25 && d[i+2]<25) d[i+3]=0;
      }
      octx.putImageData(id,0,0);
    } catch(e){}
    charImages[key] = oc;
  };
  img.src = src;
}
for(const [k,v] of Object.entries(charImgFiles)) loadCharImg(k,v);

const keys = {};

  keys[e.key]=true;
  if(e.key===' '){
    if(state==='title') state='charselect';
  }
});

canvas.addEventListener('mousemove', e=>{
  const r=canvas.getBoundingClientRect();
  mouse.x=e.clientX-r.left; mouse.y=e.clientY-r.top;
});
canvas.addEventListener('click', e=>{
  const r=canvas.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  if(state==='title'){ state='charselect'; return; }
  if(state==='charselect'){ handleCharSelectClick(mx,my); return; }
  if(state==='mapselect'){ handleMapSelectClick(mx,my); return; }
  if(state==='levelup'){ handleLevelUpClick(mx,my); return; }
  if(state==='gameover'||state==='victory'){ state='charselect'; return; }
});

// ── Enemy class ──────────────────────────────────────────────────────
class Enemy {
  constructor(x,y,ti,elapsed){
    const t=ETYPES[ti];
    const mins=elapsed/60;
    const sm=0.5+mins*0.18;
    const rm=0.85+mins*0.04;
    this.ti=ti; this.x=x; this.y=y;
    this.r=Math.round(t.r*rm);
    this.hp=Math.ceil(t.hp*sm); this.maxHp=this.hp;
    this.spd=t.spd*(0.6+mins*0.08);
    this.dmg=t.dmg*sm;
    this.col=t.col; this.xp=t.xp; this.sc=Math.ceil(t.sc*sm);
    this.name=t.n;
    this.dead=false; this.hitT=0;
    this.wobble=rand(0,Math.PI*2); this.contactCd=0;
    this.poisonT=0; this.slowT=0;
  }
  takeDamage(amt){
    if(this.dead) return;
    amt*=(player?player.dmgMult:1);
    this.hp-=amt; this.hitT=0.12;
    spawnDmgNum(this.x,this.y,Math.floor(amt));
    if(player&&player.poisonDmg>0) this.poisonT=2;
    if(this.hp<=0){ this.dead=true; this.die(); }
  }
  die(){
    score+=this.sc;
    for(let i=0;i<this.xp;i++)
      gems.push(new Gem(this.x+rand(-12,12),this.y+rand(-12,12),1));
    spawnParticles(this.x,this.y,this.col,8);
    if(player&&player.healOnKill>0) player.hp=Math.min(player.hp+player.healOnKill,player.maxHp);
  }
  update(dt){
    if(this.slowT>0){ this.slowT-=dt; }
    const spdMult=this.slowT>0?0.5:1;
    const dx=player.x-this.x, dy=player.y-this.y;
    const d=Math.hypot(dx,dy)||1;
    this.x+=dx/d*this.spd*spdMult*dt;
    this.y+=dy/d*this.spd*spdMult*dt;
    this.wobble+=dt*3.5;
    if(this.hitT>0) this.hitT-=dt;
    if(this.contactCd>0) this.contactCd-=dt;
    if(this.poisonT>0){
      this.poisonT-=dt;
      const pdmg=(player?player.poisonDmg||0:0);
      if(pdmg>0){ this.hp-=pdmg*dt; if(this.hp<=0&&!this.dead){this.dead=true;this.die();}}
    }
    if(!this.dead && dist(this,player)<this.r+player.r && this.contactCd<=0){
      player.takeDamage(this.dmg*(1-player.defense));
      this.contactCd=0.5;
    }
  }
  draw(){
    const sx=this.x-camera.x, sy=this.y-camera.y;
    if(sx<-60||sx>W+60||sy<-60||sy>H+60) return;
    const bob=Math.sin(this.wobble)*2;
    ctx.save();
    if(this.hitT>0) ctx.filter='brightness(3) saturate(0)';
    ctx.fillStyle='rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(sx,sy+this.r-1,this.r*.8,this.r*.3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=this.col;
    ctx.beginPath(); ctx.arc(sx,sy+bob,this.r,0,Math.PI*2); ctx.fill();
    // eyes
    const ed=norm(player.x-this.x,player.y-this.y);
    const er=this.r*0.45, eyeR=2;
    ctx.fillStyle='#ff2200';
    ctx.beginPath();
    ctx.arc(sx+ed.x*er-ed.y*3,sy+bob+ed.y*er+ed.x*3,eyeR,0,Math.PI*2);
    ctx.arc(sx+ed.x*er+ed.y*3,sy+bob+ed.y*er-ed.x*3,eyeR,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
    if(this.hp<this.maxHp){
      const bw=this.r*2.5, bh=4, bx=sx-bw/2, by=sy-this.r-10;
      ctx.fillStyle='#333'; ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle='#ff3344'; ctx.fillRect(bx,by,bw*(this.hp/this.maxHp),bh);
    }
  }
}

// ── Boss class ───────────────────────────────────────────────────────
class Boss {
  constructor(x,y,mapIdx,isSecond){
    this.x=x; this.y=y; this.r=44;
    this.isBoss=true;
    const m=MAPS[mapIdx];
    this.name=isSecond?(m.boss2Name||m.bossName):m.bossName;
    this.col=m.bossCol;
    const baseHp=isSecond?3500:1800;
    const scale=1+mapIdx*0.25;
    this.maxHp=Math.ceil(baseHp*scale); this.hp=this.maxHp;
    this.baseDmg=35+mapIdx*5; this.dmg=this.baseDmg;
    this.spd=60+mapIdx*3;
    this.dead=false; this.hitT=0; this.wobble=0; this.contactCd=0;
    this.chargeCD=4; this.chargeTimer=3; this.isCharging=false;
    this.chargeVx=0; this.chargeVy=0; this.chargeDur=0;
    this.xp=30; this.sc=500+mapIdx*100;
  }
  takeDamage(amt){
    if(this.dead) return;
    amt*=(player?player.dmgMult:1);
    this.hp-=amt; this.hitT=0.1;
    spawnDmgNum(this.x,this.y,Math.floor(amt));
    if(this.hp<=0){ this.dead=true; this.die(); }
  }
  die(){
    score+=this.sc;
    for(let i=0;i<this.xp;i++) gems.push(new Gem(this.x+rand(-35,35),this.y+rand(-35,35),1));
    spawnParticles(this.x,this.y,'#ff2244',20);
    spawnParticles(this.x,this.y,'#ffdd44',20);
    // check victory condition
    checkBossVictory();
  }
  update(dt){
    this.wobble+=dt*1.8;
    if(this.hitT>0) this.hitT-=dt;
    if(this.isCharging){
      this.x+=this.chargeVx*dt; this.y+=this.chargeVy*dt;
      this.chargeDur-=dt;
      if(this.chargeDur<=0){ this.isCharging=false; this.chargeTimer=this.chargeCD; this.dmg=this.baseDmg; }
    } else {
      const dx=player.x-this.x, dy=player.y-this.y, d=Math.hypot(dx,dy)||1;
      this.x+=dx/d*this.spd*dt; this.y+=dy/d*this.spd*dt;
      this.chargeTimer-=dt;
      if(this.chargeTimer<=0){
        this.isCharging=true; this.chargeDur=0.55;
        const n=norm(player.x-this.x,player.y-this.y);
        this.chargeVx=n.x*400; this.chargeVy=n.y*400;
        this.dmg=this.baseDmg*2;
        spawnParticles(this.x,this.y,'#ff4400',8);
      }
    }
    if(this.contactCd>0) this.contactCd-=dt;
    if(dist(this,player)<this.r+player.r && this.contactCd<=0){
      player.takeDamage(this.dmg*(1-player.defense));
      this.contactCd=0.5;
    }
  }
  draw(){
    const sx=this.x-camera.x, sy=this.y-camera.y;
    if(sx<-100||sx>W+100||sy<-100||sy>H+100) return;
    const bob=Math.sin(this.wobble)*3;
    ctx.save();
    if(this.hitT>0) ctx.filter='brightness(2.5) saturate(0)';
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.beginPath(); ctx.ellipse(sx,sy+this.r-2,this.r*.9,this.r*.35,0,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=this.isCharging?50:25;
    ctx.shadowColor=this.isCharging?'#ff4400':this.col;
    ctx.fillStyle=this.isCharging?'#ff3300':this.col;
    ctx.beginPath(); ctx.arc(sx,sy+bob,this.r,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle=this.isCharging?'#ff6644':'#ff5566';
    ctx.beginPath(); ctx.arc(sx,sy+bob,this.r*.7,0,Math.PI*2); ctx.fill();
    // crown
    ctx.fillStyle='#ffdd44'; ctx.shadowBlur=8; ctx.shadowColor='#ffaa00';
    for(let i=0;i<5;i++){
      const a=-Math.PI/2+(i-2)*0.42;
      ctx.beginPath();
      ctx.moveTo(sx+Math.cos(a)*this.r,sy+bob+Math.sin(a)*this.r);
      ctx.lineTo(sx+Math.cos(a-0.18)*(this.r+18),sy+bob+Math.sin(a-0.18)*(this.r+18));
      ctx.lineTo(sx+Math.cos(a+0.18)*(this.r+18),sy+bob+Math.sin(a+0.18)*(this.r+18));
      ctx.closePath(); ctx.fill();
    }
    ctx.shadowBlur=0;
    // eyes
    const ed=norm(player.x-this.x,player.y-this.y);
    ctx.fillStyle='#fff';
    ctx.beginPath();
    ctx.arc(sx+ed.x*16-ed.y*11,sy+bob+ed.y*16+ed.x*11,8,0,Math.PI*2);
    ctx.arc(sx+ed.x*16+ed.y*11,sy+bob+ed.y*16-ed.x*11,8,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#ff0000';
    ctx.beginPath();
    ctx.arc(sx+ed.x*19-ed.y*11,sy+bob+ed.y*19+ed.x*11,4.5,0,Math.PI*2);
    ctx.arc(sx+ed.x*19+ed.y*11,sy+bob+ed.y*19-ed.x*11,4.5,0,Math.PI*2);
    ctx.fill();
    ctx.fillStyle='#ff6688'; ctx.font='bold 13px Courier New'; ctx.textAlign='center';
    ctx.shadowBlur=6; ctx.shadowColor='#000';
    ctx.fillText(`★ ${this.name} ★`,sx,sy+bob-this.r-8);
    ctx.shadowBlur=0;
    ctx.restore();
  }
}

function checkBossVictory(){
  setTimeout(()=>{
    const m=MAPS[selectedMapIdx];
    const aliveBosses=enemies.filter(e=>e.isBoss&&!e.dead);
    if(aliveBosses.length>0) return;
    // all bosses dead
    if(m.twoBoss){
      if(bossSpawned && boss2Spawned) triggerVictory();
      // if only first boss dead, wait for second
    } else {
      triggerVictory();
    }
  },100);
}

function triggerVictory(){
  const m=MAPS[selectedMapIdx];
  sessionCrystals=m.crystals;
  save.crystals+=sessionCrystals;
  if(!save.clearedMaps.includes(selectedMapIdx)) save.clearedMaps.push(selectedMapIdx);
  // unlock characters
  for(const [k,c] of Object.entries(CHARACTERS)){
    if(c.unlockMap===selectedMapIdx && !save.unlockedChars.includes(k)){
      save.unlockedChars.push(k);
    }
  }
  writeSave(save);
  state='victory';
}

// ── Projectile class ─────────────────────────────────────────────────
class Proj {
  constructor(x,y,vx,vy,r,col,dmg,pierce,type){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.r=r;this.col=col;this.dmg=dmg;this.pierce=pierce;
    this.type=type;this.life=2;this.gravity=0;
    this.rot=0;this.rotSpd=0;this.slow=0;this.stk=0;
    this.hit=new Set();
  }
  update(dt){
    this.x+=this.vx*dt; this.y+=this.vy*dt;
    this.vy+=this.gravity*dt;
    this.life-=dt;
    if(this.rotSpd) this.rot+=this.rotSpd*dt;
    for(let i=enemies.length-1;i>=0;i--){
      const e=enemies[i];
      if(this.hit.has(e)||e.dead) continue;
      if(dist(this,e)<this.r+e.r){
        this.hit.add(e);
        e.takeDamage(this.dmg);
        if(this.slow>0) e.slowT=Math.max(e.slowT||0,1.5);
        if(this.type==='heal'&&player) player.hp=Math.min(player.hp+2,player.maxHp);
        if(this.type==='explode'){
          for(const e2 of enemies){
            if(!e2.dead&&e2!==e&&dist(this,e2)<60+this.stk*15)
              e2.takeDamage(this.dmg*0.6);
          }
          spawnParticles(this.x,this.y,'#ff4400',8);
          this.life=-1; break;
        }
        if(this.type==='poison'){
          for(const e2 of enemies){
            if(!e2.dead&&dist(this,e2)<50+this.stk*12){
              e2.takeDamage(this.dmg*0.4); e2.poisonT=2+this.stk;
            }
          }
          spawnParticles(this.x,this.y,'#44ff66',6);
          this.life=-1; break;
        }
        this.pierce--;
        if(this.pierce<0){ this.life=-1; break; }
      }
    }
    return this.life>0;
  }
  draw(){
    const sx=this.x-camera.x, sy=this.y-camera.y;
    if(sx<-20||sx>W+20||sy<-20||sy>H+20) return;
    ctx.save();
    ctx.translate(sx,sy); ctx.rotate(this.rot);
    ctx.shadowBlur=10; ctx.shadowColor=this.col;
    ctx.fillStyle=this.col;
    ctx.beginPath(); ctx.arc(0,0,this.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.arc(-this.r*.25,-this.r*.25,this.r*.35,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── Gem class ────────────────────────────────────────────────────────
class Gem {
  constructor(x,y,v){ this.x=x;this.y=y;this.v=v;this.r=5+v;this.bob=rand(0,Math.PI*2); }
  update(dt){ this.bob+=dt*2; }
  draw(){
    const sx=this.x-camera.x, sy=this.y-camera.y;
    if(sx<-20||sx>W+20||sy<-20||sy>H+20) return;
    const b=Math.sin(this.bob)*2;
    ctx.save();
    ctx.shadowBlur=8; ctx.shadowColor='#00ff88';
    ctx.fillStyle='#00ff88';
    ctx.beginPath();
    ctx.moveTo(sx,sy+b-this.r); ctx.lineTo(sx+this.r,sy+b);
    ctx.lineTo(sx,sy+b+this.r); ctx.lineTo(sx-this.r,sy+b);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }
}

// ── Particle class ───────────────────────────────────────────────────
class Particle {
  constructor(x,y,col){
    this.x=x;this.y=y;this.col=col;
    const a=rand(0,Math.PI*2), s=rand(40,130);
    this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
    this.life=rand(0.3,.8); this.maxL=this.life; this.r=rand(2,5);
  }
  update(dt){
    this.x+=this.vx*dt; this.y+=this.vy*dt;
    this.vx*=0.93; this.vy*=0.93;
    this.life-=dt; return this.life>0;
  }
  draw(){
    const sx=this.x-camera.x, sy=this.y-camera.y;
    const a=this.life/this.maxL;
    ctx.globalAlpha=a; ctx.fillStyle=this.col;
    ctx.beginPath(); ctx.arc(sx,sy,this.r*a,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1;
  }
}

// ── Player class ─────────────────────────────────────────────────────
class Player {
  constructor(charKey){
    const c=CHARACTERS[charKey];
    this.charKey=charKey;
    this.x=0;this.y=0;this.r=16;
    this.hp=c.hp; this.maxHp=c.hp;
    this.speed=c.speed; this.xp=0; this.level=1;
    this.xpNext=5;
    this.invT=0; this.flickT=0;
    this.facing=0; this.weapons=[];
    this.pickup=65; this.cdMult=1; this.dmgMult=1;
    this.defense=0; this.poisonDmg=0;
    this.regenPerSec=0; this.healOnKill=0;
    this.glowCol=c.glowCol;
    // velocity for ice maps
    this.vx=0; this.vy=0;
    // add starting skill
    this.addSkill(c.startSkill);
  }
  addSkill(id){
    const def=SKILLS[id];
    if(!def) return;
    const existing=this.weapons.find(w=>w.id===id);
    if(existing){
      if(existing.stack<3){ existing.stack++; this._applySkillStack(id); }
      return;
    }
    if(def.type==='active'){
      this.weapons.push({id,stack:1,timer:0,cooldown:def.cooldown});
    } else {
      this.weapons.push({id,stack:1,timer:0,cooldown:999});
      this._applySkillStack(id);
    }
  }
  _applySkillStack(id){
    const def=SKILLS[id];
    if(def.type==='passive'&&def.onApply){
      const w=this.weapons.find(w=>w.id===id);
      def.onApply(this,w?w.stack:1);
    }
  }
  hasSkill(id){ return this.weapons.some(w=>w.id===id); }
  gainXP(v){
    this.xp+=v;
    while(this.xp>=this.xpNext){ this.xp-=this.xpNext; this.levelUp(); }
  }
  levelUp(){
    this.level++;
    this.xpNext=Math.floor(this.xpNext*1.2+2);
    this.hp=Math.min(this.hp+15,this.maxHp);
    buildUpgradeChoices();
    state='levelup';
  }
  takeDamage(amt){
    if(this.invT>0) return;
    this.hp-=amt;
    this.invT=0.7; this.flickT=0.7;
    spawnParticles(this.x,this.y,'#ff4444',6);
    if(this.hp<=0){ this.hp=0; state='gameover'; }
  }
  update(dt){
    let dx=0,dy=0;
    if(keys['ArrowLeft']||keys['a']||keys['A']) dx-=1;
    if(keys['ArrowRight']||keys['d']||keys['D']) dx+=1;
    if(keys['ArrowUp']||keys['w']||keys['W']) dy-=1;
    if(keys['ArrowDown']||keys['s']||keys['S']) dy+=1;
    const m=MAPS[selectedMapIdx];
    if(m.mechanic==='ice'){
      // ice sliding: inertia
      const n=norm(dx||0.001,dy||0.001);
      if(dx||dy){
        this.vx=lerp(this.vx,n.x*this.speed,dt*2);
        this.vy=lerp(this.vy,n.y*this.speed,dt*2);
      } else {
        this.vx*=Math.pow(0.96,dt*60); this.vy*=Math.pow(0.96,dt*60);
      }
      this.x+=this.vx*dt; this.y+=this.vy*dt;
    } else if(m.mechanic==='current'){
      // water current push
      const n2=norm(dx,dy);
      this.x+=n2.x*this.speed*dt + 35*dt;
      this.y+=n2.y*this.speed*dt + 20*Math.sin(gameTime)*dt;
    } else {
      const n=norm(dx,dy);
      this.x+=n.x*this.speed*dt;
      this.y+=n.y*this.speed*dt;
    }
    this.x=clamp(this.x,-MAP_HW+this.r,MAP_HW-this.r);
    this.y=clamp(this.y,-MAP_HH+this.r,MAP_HH-this.r);
    if(dx||dy) this.facing=Math.atan2(dy,dx);
    if(this.invT>0) this.invT-=dt;
    if(this.flickT>0) this.flickT-=dt;
    // regen
    if(this.regenPerSec>0) this.hp=Math.min(this.hp+this.regenPerSec*dt,this.maxHp);
    // fire active skills
    for(const w of this.weapons){
      const def=SKILLS[w.id];
      if(!def||def.type!=='active') continue;
      w.timer-=dt;
      if(w.timer<=0){
        w.timer=w.cooldown*this.cdMult;
        def.fire(w,this,w.stack);
      }
    }
    // gem pickup
    for(let i=gems.length-1;i>=0;i--){
      const g=gems[i], d=dist(this,g);
      if(d<this.pickup+g.r){
        this.gainXP(g.v);
        spawnParticles(g.x,g.y,'#00ff88',4);
        gems.splice(i,1);
      } else if(d<this.pickup*3){
        const pn=norm(this.x-g.x,this.y-g.y);
        g.x+=pn.x*280*dt; g.y+=pn.y*280*dt;
      }
    }
  }
  draw(){
    if(this.flickT>0&&Math.floor(this.flickT*10)%2===0) return;
    const sx=this.x-camera.x, sy=this.y-camera.y;
    const size=this.r*1.6;
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.beginPath(); ctx.ellipse(sx,sy+this.r-2,this.r*.85,this.r*.3,0,0,Math.PI*2); ctx.fill();
    const g=ctx.createRadialGradient(sx,sy,0,sx,sy,this.r*1.4);
    g.addColorStop(0,this.glowCol.replace(')',',0.45)').replace('rgb','rgba'));
    g.addColorStop(1,this.glowCol.replace(')',',0)').replace('rgb','rgba'));
    ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(sx,sy,this.r*1.4,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0; ctx.shadowColor='transparent';
    ctx.globalAlpha=1; ctx.globalCompositeOperation='source-over'; ctx.filter='none';
    const img=charImages[this.charKey];
    if(img){
      if(Math.cos(this.facing)<0){
        ctx.translate(sx,sy); ctx.scale(-1,1);
        ctx.drawImage(img,-size/2,-size/2,size,size);
      } else {
        ctx.drawImage(img,sx-size/2,sy-size/2,size,size);
      }
    } else {
      ctx.shadowBlur=15; ctx.shadowColor=this.glowCol;
      ctx.fillStyle=this.glowCol;
      ctx.beginPath(); ctx.arc(sx,sy,this.r,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

// ── helpers ──────────────────────────────────────────────────────────
function nearestEnemies(x,y,count){
  return [...enemies].filter(e=>!e.dead)
    .sort((a,b)=>Math.hypot(a.x-x,a.y-y)-Math.hypot(b.x-x,b.y-y))
    .slice(0,count);
}
function spawnParticles(x,y,col,n){
  if(particles.length>400) return;
  for(let i=0;i<n;i++) particles.push(new Particle(x,y,col));
}
function spawnDmgNum(x,y,v){
  damageNums.push({x,y,v,life:0.9,maxL:0.9,vy:-55});
}

// ── spawning ─────────────────────────────────────────────────────────
function spawnEnemy(){
  if(enemies.length>=200) return;
  const side=randInt(0,3);
  let x,y; const M=130;
  if(side===0){x=camera.x-M;y=camera.y+rand(0,H);}
  else if(side===1){x=camera.x+W+M;y=camera.y+rand(0,H);}
  else if(side===2){x=camera.x+rand(0,W);y=camera.y-M;}
  else{x=camera.x+rand(0,W);y=camera.y+H+M;}
  const mins=gameTime/60;
  let pool;
  if(mins<1)      pool=[0,0,0,1];
  else if(mins<2) pool=[0,0,1,1,5];
  else if(mins<3) pool=[0,1,1,2,5];
  else if(mins<5) pool=[0,1,2,2,3,5];
  else if(mins<7) pool=[1,2,2,3,3,5];
  else            pool=[2,3,3,4,4,5];
  enemies.push(new Enemy(x,y,pool[randInt(0,pool.length-1)],gameTime));
}

function spawnBoss(isSecond){
  const side=randInt(0,3);
  let x,y; const M=180;
  if(side===0){x=camera.x-M;y=camera.y+H/2;}
  else if(side===1){x=camera.x+W+M;y=camera.y+H/2;}
  else if(side===2){x=camera.x+W/2;y=camera.y-M;}
  else{x=camera.x+W/2;y=camera.y+H+M;}
  const boss=new Boss(x,y,selectedMapIdx,isSecond);
  enemies.push(boss);
  roundBanner={text:`⚠ BOSS ${boss.name} 出现了! ⚠`,timer:3};
}

// ── level up ─────────────────────────────────────────────────────────
function buildUpgradeChoices(){
  const pool=[];
  const skillPool=CHAR_SKILL_POOLS[selectedCharKey]||[];
  // skill upgrades (stack existing or add new)
  for(const sid of skillPool){
    const def=SKILLS[sid];
    if(!def) continue;
    const existing=player.weapons.find(w=>w.id===sid);
    if(existing){
      if(existing.stack<3){
        pool.push({
          type:'skill_up', id:sid,
          name:`强化 ${def.name}`, desc:`叠加到 ${existing.stack+1}/3 层`,
          icon:def.icon, col:def.color, sid
        });
      }
    } else {
      pool.push({
        type:'skill_new', id:sid,
        name:`获得 ${def.name}`, desc:def.desc,
        icon:def.icon, col:def.color, sid
      });
    }
  }
  // stat ups
  for(const s of STAT_UPS){
    pool.push({type:'stat',name:s.name,desc:s.desc,icon:s.icon,col:'#aaaacc',apply:s.f});
  }
  shuffle(pool);
  upgradeChoices=pool.slice(0,3);
}

function handleLevelUpClick(mx,my){
  const cw=210,ch=220,gap=30;
  const total=cw*3+gap*2;
  const sx=(W-total)/2, sy=(H-ch)/2-20;
  for(let i=0;i<upgradeChoices.length;i++){
    const cx=sx+i*(cw+gap);
    if(mx>=cx&&mx<=cx+cw&&my>=sy&&my<=sy+ch){
      applyUpgrade(upgradeChoices[i]);
      state='playing';
      break;
    }
  }
}

function applyUpgrade(c){
  if(c.type==='skill_up'||c.type==='skill_new'){
    player.addSkill(c.sid);
  } else {
    c.apply(player);
  }
}

// ── character select ─────────────────────────────────────────────────
function handleCharSelectClick(mx,my){
  const chars=Object.entries(CHARACTERS);
  const cw=140,ch=180,gap=16;
  const total=cw*chars.length+gap*(chars.length-1);
  const sx=(W-total)/2, sy=220;
  for(let i=0;i<chars.length;i++){
    const cx=sx+i*(cw+gap);
    const [key]=chars[i];
    const unlocked=save.unlockedChars.includes(key);
    if(mx>=cx&&mx<=cx+cw&&my>=sy&&my<=sy+ch&&unlocked){
      selectedCharKey=key;
      state='mapselect';
      return;
    }
  }
}

// ── map select ───────────────────────────────────────────────────────
function handleMapSelectClick(mx,my){
  const cols=4, rows=2;
  const cw=180, ch=100, gap=16;
  const totalW=cw*cols+gap*(cols-1);
  const baseX=(W-totalW)/2, baseY=180;
  for(let i=0;i<MAPS.length;i++){
    const row=Math.floor(i/cols), col=i%cols;
    const cx=baseX+col*(cw+gap), cy=baseY+row*(ch+gap);
    const unlocked=i===0||save.clearedMaps.includes(i-1);
    if(mx>=cx&&mx<=cx+cw&&my>=cy&&my<=cy+ch&&unlocked){
      selectedMapIdx=i;
      startGame();
      return;
    }
  }
  // back button
  if(mx>=20&&mx<=120&&my>=H-50&&my<=H-20){
    state='charselect';
  }
}

// ── draw helpers ─────────────────────────────────────────────────────
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ── start game ───────────────────────────────────────────────────────
let roundBanner=null;
function startGame(){
  player=new Player(selectedCharKey);
  camera={x:-W/2,y:-H/2};
  enemies=[];projectiles=[];gems=[];particles=[];
  damageNums=[];lightningFX=[];
  gameTime=0;score=0;spawnTimer=0;
  upgradeChoices=[];
  bossSpawned=false; boss2Spawned=false;
  sessionCrystals=0;
  roundBanner=null;
  mapHazards={timer:0,zones:[],mirrorClone:null,frozen:false,freezeTimer:0};
  state='playing';
}

// ── update ───────────────────────────────────────────────────────────
function update(dt){
  if(state!=='playing') return;
  gameTime+=dt;

  const m=MAPS[selectedMapIdx];

  // boss spawn logic
  if(m.twoBoss){
    if(!bossSpawned && gameTime>=300){ bossSpawned=true; spawnBoss(false); }
    if(!boss2Spawned && gameTime>=600){ boss2Spawned=true; spawnBoss(true); }
  } else {
    if(!bossSpawned && gameTime>=180){ bossSpawned=true; spawnBoss(false); }
  }

  // round banner
  if(roundBanner){ roundBanner.timer-=dt; if(roundBanner.timer<=0) roundBanner=null; }

  camera.x=player.x-W/2;
  camera.y=player.y-H/2;

  // map hazards
  updateMapHazards(dt);

  // timestop check
  const frozen=mapHazards.frozen||false;

  player.update(dt);

  for(let i=projectiles.length-1;i>=0;i--)
    if(!projectiles[i].update(dt)) projectiles.splice(i,1);

  if(!frozen){
    for(const e of enemies) if(!e.dead) e.update(dt);
  }
  for(let i=enemies.length-1;i>=0;i--)
    if(enemies[i].dead) enemies.splice(i,1);

  for(const g of gems) g.update(dt);
  for(let i=particles.length-1;i>=0;i--)
    if(!particles[i].update(dt)) particles.splice(i,1);
  for(let i=damageNums.length-1;i>=0;i--){
    const d=damageNums[i];
    d.y+=d.vy*dt; d.vy*=0.88; d.life-=dt;
    if(d.life<=0) damageNums.splice(i,1);
  }
  for(let i=lightningFX.length-1;i>=0;i--){
    lightningFX[i].t-=dt;
    if(lightningFX[i].t<=0) lightningFX.splice(i,1);
  }

  // spawn
  spawnTimer-=dt;
  if(spawnTimer<=0){
    const mins=gameTime/60;
    const interval=Math.max(0.3, 2.5-mins*0.25);
    const cnt=Math.max(1, Math.floor(mins*0.6+1));
    for(let i=0;i<cnt;i++) spawnEnemy();
    spawnTimer=interval;
  }
}

// ── map hazards ──────────────────────────────────────────────────────
function updateMapHazards(dt){
  const m=MAPS[selectedMapIdx];
  const h=mapHazards;
  h.timer=(h.timer||0)+dt;

  if(m.mechanic==='minecart'){
    // periodic mine cart every 8s
    if(!h.carts) h.carts=[];
    if(!h.cartSpawn) h.cartSpawn=0;
    h.cartSpawn-=dt;
    if(h.cartSpawn<=0){
      h.cartSpawn=8;
      const y=player.y+rand(-200,200);
      h.carts.push({x:-MAP_HW-100,y,w:80,h:30,spd:500});
    }
    for(let i=h.carts.length-1;i>=0;i--){
      const c=h.carts[i]; c.x+=c.spd*dt;
      if(c.x>MAP_HW+200){ h.carts.splice(i,1); continue; }
      if(Math.abs(player.x-c.x)<c.w&&Math.abs(player.y-c.y)<c.h){
        player.takeDamage(15*(1-player.defense));
      }
    }
  }
  if(m.mechanic==='fire'){
    if(!h.fireZones) h.fireZones=[];
    if(!h.fireSpawn) h.fireSpawn=0;
    h.fireSpawn-=dt;
    if(h.fireSpawn<=0){
      h.fireSpawn=5;
      for(let i=0;i<3;i++){
        h.fireZones.push({x:player.x+rand(-250,250),y:player.y+rand(-250,250),r:50,life:3,warn:1.5});
      }
    }
    for(let i=h.fireZones.length-1;i>=0;i--){
      const z=h.fireZones[i]; z.life-=dt; z.warn-=dt;
      if(z.life<=0){ h.fireZones.splice(i,1); continue; }
      if(z.warn<=0&&dist(player,z)<z.r+player.r){
        player.takeDamage(8*dt*(1-player.defense));
      }
    }
  }
  if(m.mechanic==='holylight'){
    if(!h.holyZones) h.holyZones=[];
    if(!h.holySpawn) h.holySpawn=0;
    h.holySpawn-=dt;
    if(h.holySpawn<=0){
      h.holySpawn=6;
      for(let i=0;i<2;i++){
        h.holyZones.push({x:player.x+rand(-200,200),y:player.y+rand(-200,200),r:60,life:4,warn:2});
      }
    }
    for(let i=h.holyZones.length-1;i>=0;i--){
      const z=h.holyZones[i]; z.life-=dt; z.warn-=dt;
      if(z.life<=0){ h.holyZones.splice(i,1); continue; }
      if(z.warn<=0&&dist(player,z)<z.r+player.r){
        player.takeDamage(10*dt*(1-player.defense));
      }
    }
  }
  if(m.mechanic==='timestop'){
    if(!h.freezeCD) h.freezeCD=12;
    h.freezeCD-=dt;
    if(h.freezeCD<=0&&!h.frozen){
      h.frozen=true; h.freezeDur=2.5;
      roundBanner={text:'⏸ 时间冻结! ⏸',timer:2};
    }
    if(h.frozen){
      h.freezeDur-=dt;
      if(h.freezeDur<=0){ h.frozen=false; h.freezeCD=12; }
    }
  }
  if(m.mechanic==='mirror'){
    if(!h.mirrorCD) h.mirrorCD=15;
    h.mirrorCD-=dt;
    if(h.mirrorCD<=0&&!h.mirrorClone){
      h.mirrorCD=15;
      const clone=new Enemy(player.x+rand(-100,100),player.y+rand(-100,100),3,gameTime);
      clone.hp=player.maxHp*0.6; clone.maxHp=clone.hp;
      clone.spd=player.speed*0.8; clone.col='#aa00aa';
      clone.name='镜像分身'; clone.isMirror=true;
      enemies.push(clone);
      roundBanner={text:'⚠ 镜像分身出现! ⚠',timer:2};
    }
  }
}

// ── draw functions ───────────────────────────────────────────────────
function drawBg(){
  const m=MAPS[selectedMapIdx];
  ctx.fillStyle=m.bgCol; ctx.fillRect(0,0,W,H);

  const leftX=-MAP_HW-camera.x, rightX=MAP_HW-camera.x;
  const topY=-MAP_HH-camera.y, botY=MAP_HH-camera.y;

  ctx.fillStyle='rgba(0,0,0,0.55)';
  if(leftX>0) ctx.fillRect(0,0,leftX,H);
  if(rightX<W) ctx.fillRect(rightX,0,W-rightX,H);
  if(topY>0) ctx.fillRect(leftX,0,rightX-leftX,topY);
  if(botY<H) ctx.fillRect(leftX,botY,rightX-leftX,H-botY);

  // grid
  ctx.save();
  ctx.beginPath();
  ctx.rect(Math.max(0,leftX),Math.max(0,topY),
    Math.min(W,rightX)-Math.max(0,leftX),Math.min(H,botY)-Math.max(0,topY));
  ctx.clip();
  ctx.strokeStyle=m.gridCol; ctx.lineWidth=1;
  const SZ=64, ox=(-camera.x)%SZ, oy=(-camera.y)%SZ;
  for(let x=ox;x<W;x+=SZ){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=oy;y<H;y+=SZ){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  ctx.restore();

  // walls
  const t=Date.now()/1000, pulse=0.6+0.4*Math.sin(t*2);
  ctx.save();
  ctx.shadowBlur=24*pulse; ctx.shadowColor=m.wallCol;
  ctx.strokeStyle=m.wallCol.replace(')',`,${0.6*pulse})`).includes('rgba')?m.wallCol:`${m.wallCol}`;
  ctx.globalAlpha=0.6*pulse;
  ctx.lineWidth=6;
  const L=leftX,R=rightX,T=topY,B=botY;
  if(L>-6&&L<W){ctx.beginPath();ctx.moveTo(L,Math.max(0,T));ctx.lineTo(L,Math.min(H,B));ctx.stroke();}
  if(R>0&&R<W+6){ctx.beginPath();ctx.moveTo(R,Math.max(0,T));ctx.lineTo(R,Math.min(H,B));ctx.stroke();}
  if(T>-6&&T<H){ctx.beginPath();ctx.moveTo(Math.max(0,L),T);ctx.lineTo(Math.min(W,R),T);ctx.stroke();}
  if(B>0&&B<H+6){ctx.beginPath();ctx.moveTo(Math.max(0,L),B);ctx.lineTo(Math.min(W,R),B);ctx.stroke();}
  ctx.restore();

  // draw map hazards
  drawMapHazards();
}

function drawMapHazards(){
  const m=MAPS[selectedMapIdx];
  const h=mapHazards;
  if(m.mechanic==='minecart'&&h.carts){
    for(const c of h.carts){
      const sx=c.x-camera.x, sy=c.y-camera.y;
      ctx.fillStyle='#887744'; ctx.fillRect(sx-c.w/2,sy-c.h/2,c.w,c.h);
      ctx.fillStyle='#554422'; ctx.fillRect(sx-c.w/2+5,sy-c.h/2+5,c.w-10,c.h-10);
      // track line
      ctx.strokeStyle='rgba(136,119,68,0.3)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(0,sy); ctx.lineTo(W,sy); ctx.stroke();
    }
  }
  if(m.mechanic==='fire'&&h.fireZones){
    for(const z of h.fireZones){
      const sx=z.x-camera.x, sy=z.y-camera.y;
      if(z.warn>0){
        ctx.strokeStyle='rgba(255,100,0,0.5)'; ctx.lineWidth=2; ctx.setLineDash([4,4]);
        ctx.beginPath(); ctx.arc(sx,sy,z.r,0,Math.PI*2); ctx.stroke();
        ctx.setLineDash([]);
      } else {
        ctx.fillStyle='rgba(255,60,0,0.3)';
        ctx.beginPath(); ctx.arc(sx,sy,z.r,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,200,0,0.15)';
        ctx.beginPath(); ctx.arc(sx,sy,z.r*0.6,0,Math.PI*2); ctx.fill();
      }
    }
  }
  if(m.mechanic==='holylight'&&h.holyZones){
    for(const z of h.holyZones){
      const sx=z.x-camera.x, sy=z.y-camera.y;
      if(z.warn>0){
        ctx.strokeStyle='rgba(200,180,255,0.4)'; ctx.lineWidth=2; ctx.setLineDash([6,4]);
        ctx.beginPath(); ctx.arc(sx,sy,z.r,0,Math.PI*2); ctx.stroke();
        ctx.setLineDash([]);
      } else {
        ctx.fillStyle='rgba(200,180,255,0.25)';
        ctx.beginPath(); ctx.arc(sx,sy,z.r,0,Math.PI*2); ctx.fill();
      }
    }
  }
  if(m.mechanic==='current'){
    // draw current arrows
    ctx.globalAlpha=0.15; ctx.fillStyle='#44aaaa';
    const t=Date.now()/1000;
    for(let i=0;i<8;i++){
      const ax=((i*120+t*40)%W), ay=((i*90+t*15)%H);
      ctx.beginPath(); ctx.moveTo(ax,ay); ctx.lineTo(ax+20,ay+5); ctx.lineTo(ax,ay+10); ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  if(m.mechanic==='timestop'&&h.frozen){
    ctx.fillStyle='rgba(100,150,255,0.1)'; ctx.fillRect(0,0,W,H);
  }
}

function drawLightning(){
  for(const lb of lightningFX){
    const sx1=lb.x1-camera.x,sy1=lb.y1-camera.y;
    const sx2=lb.x2-camera.x,sy2=lb.y2-camera.y;
    ctx.save();
    ctx.strokeStyle='#aabbff'; ctx.lineWidth=2.5;
    ctx.shadowBlur=14; ctx.shadowColor='#4466ff';
    ctx.beginPath(); ctx.moveTo(sx1,sy1);
    for(let s=1;s<7;s++){
      const t=s/7;
      ctx.lineTo(lerp(sx1,sx2,t)+rand(-18,18),lerp(sy1,sy2,t)+rand(-18,18));
    }
    ctx.lineTo(sx2,sy2); ctx.stroke();
    ctx.restore();
  }
}

function drawHUD(){
  // HP bar
  const hw=220,hh=18,hx=10,hy=10;
  ctx.fillStyle='#2a0a0a'; ctx.fillRect(hx,hy,hw,hh);
  const hpRatio=clamp(player.hp/player.maxHp,0,1);
  const hpGrad=ctx.createLinearGradient(hx,hy,hx+hw,hy);
  hpGrad.addColorStop(0,'#ff1a1a'); hpGrad.addColorStop(1,'#ff5544');
  ctx.fillStyle=hpGrad; ctx.fillRect(hx,hy,hw*hpRatio,hh);
  ctx.strokeStyle='#444'; ctx.lineWidth=1; ctx.strokeRect(hx,hy,hw,hh);
  ctx.fillStyle='#fff'; ctx.font='bold 11px Courier New'; ctx.textAlign='center';
  ctx.fillText(`${Math.ceil(player.hp)} / ${player.maxHp} HP`,hx+hw/2,hy+13);

  // XP bar
  const xw=220,xh=10,xx=10,xy=32;
  ctx.fillStyle='#0a2a0a'; ctx.fillRect(xx,xy,xw,xh);
  const xpRatio=clamp(player.xp/player.xpNext,0,1);
  ctx.fillStyle='#00cc66'; ctx.fillRect(xx,xy,xw*xpRatio,xh);
  ctx.strokeStyle='#444'; ctx.strokeRect(xx,xy,xw,xh);

  // Level + character name
  ctx.fillStyle='#ffdd44'; ctx.font='bold 14px Courier New'; ctx.textAlign='left';
  const c=CHARACTERS[selectedCharKey];
  ctx.fillText(`${c.name} Lv.${player.level}`,hx+xw+8,hy+14);

  // Time + map
  const m=MAPS[selectedMapIdx];
  const totalSec=m.twoBoss?600:180;
  const secsLeft=Math.max(0,Math.ceil(totalSec-gameTime));
  const mins=Math.floor(secsLeft/60), secs=secsLeft%60;
  ctx.fillStyle='#ffffff'; ctx.font='bold 12px Courier New'; ctx.textAlign='center';
  ctx.fillText(`${m.name}  ${mins}:${secs.toString().padStart(2,'0')}`,W/2,20);

  // time bar
  const rw=180,rh=8,rx=(W-rw)/2,ry=26;
  ctx.fillStyle='#1a1a3a'; ctx.fillRect(rx,ry,rw,rh);
  const timeRatio=clamp(gameTime/totalSec,0,1);
  const barCol=timeRatio<0.6?'#44cc44':timeRatio<0.8?'#ccaa00':'#cc2222';
  ctx.fillStyle=barCol; ctx.fillRect(rx,ry,rw*timeRatio,rh);
  ctx.strokeStyle='#555'; ctx.lineWidth=1; ctx.strokeRect(rx,ry,rw,rh);

  // Crystals + score
  ctx.fillStyle='#88ddff'; ctx.font='14px Courier New'; ctx.textAlign='right';
  ctx.fillText(`晶石: ${save.crystals}`,W-10,20);
  ctx.fillStyle='#ffaa00'; ctx.font='12px Courier New';
  ctx.fillText(`${score} 分  敌人:${enemies.length}`,W-10,38);

  // Skills list
  ctx.textAlign='left';
  const activeSkills=player.weapons.filter(w=>SKILLS[w.id]&&SKILLS[w.id].type==='active');
  activeSkills.forEach((w,i)=>{
    const wy=H-12-i*20;
    const def=SKILLS[w.id];
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(6,wy-14,180,18);
    ctx.fillStyle=def.color||'#ccc'; ctx.font='13px Courier New';
    ctx.fillText(`${def.icon} ${def.name} ×${w.stack}`,10,wy);
  });

  // Controls hint
  if(gameTime<10){
    const a=clamp((10-gameTime)/3,0,1);
    ctx.globalAlpha=a;
    ctx.fillStyle='#aaa'; ctx.font='12px Courier New'; ctx.textAlign='center';
    ctx.fillText('WASD/方向键移动  技能自动释放  收集经验石升级',W/2,H-8);
    ctx.globalAlpha=1;
  }
}

function drawBossBar(){
  const boss=enemies.find(e=>e.isBoss);
  if(!boss) return;
  const bw=500,bh=26,bx=(W-bw)/2,by=H-50;
  ctx.save();
  ctx.shadowBlur=16; ctx.shadowColor='#ff0044';
  ctx.fillStyle='#110008'; ctx.fillRect(bx-3,by-3,bw+6,bh+6);
  ctx.shadowBlur=0;
  ctx.fillStyle='#220011'; ctx.fillRect(bx,by,bw,bh);
  const ratio=clamp(boss.hp/boss.maxHp,0,1);
  const g=ctx.createLinearGradient(bx,by,bx+bw,by);
  g.addColorStop(0,'#880022'); g.addColorStop(0.5,'#ff2244'); g.addColorStop(1,'#ff6644');
  ctx.fillStyle=g; ctx.fillRect(bx,by,bw*ratio,bh);
  ctx.strokeStyle='#ff0044'; ctx.lineWidth=2; ctx.strokeRect(bx,by,bw,bh);
  ctx.fillStyle='#fff'; ctx.font='bold 13px Courier New'; ctx.textAlign='center';
  ctx.fillText(`★ ${boss.name} ★  ${Math.ceil(boss.hp)} / ${boss.maxHp}`,W/2,by+18);
  ctx.restore();
}

function drawRoundBanner(){
  if(!roundBanner||roundBanner.timer<=0) return;
  const alpha=clamp(roundBanner.timer/0.6,0,1);
  ctx.save(); ctx.globalAlpha=alpha;
  ctx.fillStyle='rgba(0,0,0,0.55)'; ctx.fillRect(0,H/2-40,W,80);
  ctx.fillStyle='#ffdd44'; ctx.font='bold 32px Courier New'; ctx.textAlign='center';
  ctx.shadowBlur=20; ctx.shadowColor='#ffaa00';
  ctx.fillText(roundBanner.text,W/2,H/2+10);
  ctx.shadowBlur=0; ctx.restore();
}

function drawLevelUpScreen(){
  ctx.fillStyle='rgba(0,0,0,0.75)'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffdd44'; ctx.font='bold 24px Courier New'; ctx.textAlign='center';
  ctx.shadowBlur=20; ctx.shadowColor='#ffaa00';
  ctx.fillText('✦ 升级! 选择一项强化 ✦',W/2,H/2-148);
  ctx.shadowBlur=0;
  const cw=210,ch=220,gap=30;
  const total=cw*3+gap*2;
  const sx=(W-total)/2, sy=(H-ch)/2-20;
  upgradeChoices.forEach((c,i)=>{
    const cx=sx+i*(cw+gap);
    const hover=mouse.x>=cx&&mouse.x<=cx+cw&&mouse.y>=sy&&mouse.y<=sy+ch;
    ctx.fillStyle=hover?'#252550':'#14143a';
    ctx.strokeStyle=hover?c.col||'#6688cc':'#3344aa';
    ctx.lineWidth=hover?2.5:1.5;
    roundRect(cx,sy,cw,ch,10); ctx.fill(); ctx.stroke();
    ctx.fillStyle=c.col||'#6688cc'; ctx.globalAlpha=0.25;
    ctx.beginPath(); ctx.arc(cx+cw/2,sy+50,28,0,Math.PI*2); ctx.fill();
    ctx.globalAlpha=1; ctx.fillStyle=c.col||'#fff';
    ctx.font='bold 26px Courier New'; ctx.textAlign='center';
    ctx.fillText(c.icon,cx+cw/2,sy+60);
    ctx.fillStyle='#fff'; ctx.font='bold 13px Courier New';
    ctx.fillText(c.name,cx+cw/2,sy+95);
    ctx.fillStyle='#aaaacc'; ctx.font='12px Courier New';
    const maxW2=cw-20; let line='',lines=[];
    for(const ch2 of c.desc){
      const test=line+ch2;
      if(ctx.measureText(test).width>maxW2){lines.push(line);line=ch2;}else line=test;
    }
    if(line) lines.push(line);
    lines.forEach((l,li)=>ctx.fillText(l,cx+cw/2,sy+118+li*16));
    ctx.fillStyle=hover?'#ffdd44':'#445588'; ctx.font='11px Courier New';
    ctx.fillText('点击选择',cx+cw/2,sy+ch-12);
  });
}

// ── title screen ─────────────────────────────────────────────────────
function drawTitle(){
  ctx.fillStyle='#080812'; ctx.fillRect(0,0,W,H);
  const t=Date.now()/1000;
  ctx.fillStyle='rgba(255,255,255,0.7)';
  for(let i=0;i<80;i++){
    const bx=((i*137+50)%W), by=((i*91+30)%H);
    const sz=.5+Math.sin(t+i)*.5;
    ctx.beginPath(); ctx.arc(bx,by,sz,0,Math.PI*2); ctx.fill();
  }
  ctx.textAlign='center';
  ctx.font='bold 52px Courier New'; ctx.fillStyle='#44aaff';
  ctx.shadowBlur=30; ctx.shadowColor='#2288ff';
  ctx.fillText('Souler 魔法特遣队',W/2,160);
  ctx.shadowBlur=0;
  ctx.font='16px Courier New'; ctx.fillStyle='#8888aa';
  ctx.fillText('Souler Magic Task Force',W/2,200);
  ctx.fillStyle='#aaaacc'; ctx.font='14px Courier New';
  const lines=[
    '选择角色和地图，消灭怪物升级技能',
    '击败BOSS通关解锁新角色和地图',
    '收集晶石，挑战8张独特地图!',
  ];
  lines.forEach((l,i)=>ctx.fillText(l,W/2,280+i*28));
  if(Math.floor(Date.now()/550)%2===0){
    ctx.fillStyle='#ffdd44'; ctx.font='bold 20px Courier New';
    ctx.shadowBlur=10; ctx.shadowColor='#ffaa00';
    ctx.fillText('按空格键 或 点击屏幕 开始',W/2,420);
    ctx.shadowBlur=0;
  }
}

// ── character select screen ──────────────────────────────────────────
function drawCharSelect(){
  ctx.fillStyle='#080812'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 30px Courier New'; ctx.fillStyle='#44aaff';
  ctx.shadowBlur=20; ctx.shadowColor='#2288ff';
  ctx.fillText('选择角色',W/2,60);
  ctx.shadowBlur=0;
  ctx.fillStyle='#88ddff'; ctx.font='14px Courier New';
  ctx.fillText(`晶石: ${save.crystals}`,W/2,90);

  const chars=Object.entries(CHARACTERS);
  const cw=140,ch=180,gap=16;
  const total=cw*chars.length+gap*(chars.length-1);
  const sx=(W-total)/2, sy=120;
  chars.forEach(([key,c],i)=>{
    const cx=sx+i*(cw+gap);
    const unlocked=save.unlockedChars.includes(key);
    const hover=unlocked&&mouse.x>=cx&&mouse.x<=cx+cw&&mouse.y>=sy&&mouse.y<=sy+ch;
    ctx.fillStyle=unlocked?(hover?'#1a2244':'#0e1230'):'#0a0a15';
    ctx.strokeStyle=unlocked?(hover?c.glowCol:'#334466'):'#222233';
    ctx.lineWidth=hover?2.5:1.5;
    roundRect(cx,sy,cw,ch,10); ctx.fill(); ctx.stroke();
    // image
    const img=charImages[c.imgKey];
    if(img&&unlocked){
      ctx.save();
      ctx.shadowBlur=0; ctx.shadowColor='transparent';
      ctx.globalAlpha=1; ctx.filter='none'; ctx.globalCompositeOperation='source-over';
      ctx.drawImage(img,cx+cw/2-28,sy+12,56,56);
      ctx.restore();
    } else {
      ctx.fillStyle=unlocked?c.glowCol:'#333';
      ctx.beginPath(); ctx.arc(cx+cw/2,sy+40,22,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle=unlocked?'#fff':'#555'; ctx.font='bold 14px Courier New';
    ctx.fillText(c.name,cx+cw/2,sy+86);
    ctx.fillStyle=unlocked?c.glowCol:'#444'; ctx.font='11px Courier New';
    ctx.fillText(c.cls,cx+cw/2,sy+104);
    if(unlocked){
      ctx.fillStyle='#aaa'; ctx.font='11px Courier New';
      ctx.fillText(c.desc,cx+cw/2,sy+122);
      const sk=SKILLS[c.startSkill];
      if(sk){
        ctx.fillStyle=sk.color; ctx.font='10px Courier New';
        ctx.fillText(`${sk.icon} ${sk.name}`,cx+cw/2,sy+140);
      }
    } else {
      ctx.fillStyle='#555'; ctx.font='11px Courier New';
      const mapIdx=c.unlockMap;
      ctx.fillText(`通关${MAPS[mapIdx].name}解锁`,cx+cw/2,sy+130);
    }
    if(hover){
      ctx.fillStyle='#ffdd44'; ctx.font='11px Courier New';
      ctx.fillText('点击选择',cx+cw/2,sy+ch-10);
    }
  });
}

// ── map select screen ────────────────────────────────────────────────
function drawMapSelect(){
  ctx.fillStyle='#080812'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  const c=CHARACTERS[selectedCharKey];
  ctx.font='bold 26px Courier New'; ctx.fillStyle='#44aaff';
  ctx.shadowBlur=15; ctx.shadowColor='#2288ff';
  ctx.fillText('选择地图',W/2,50);
  ctx.shadowBlur=0;
  ctx.fillStyle='#aaa'; ctx.font='13px Courier New';
  ctx.fillText(`角色: ${c.name} (${c.cls})    晶石: ${save.crystals}`,W/2,78);

  const cols=4, rows=2;
  const cw=180, ch=100, gap=16;
  const totalW=cw*cols+gap*(cols-1);
  const baseX=(W-totalW)/2, baseY=100;
  MAPS.forEach((m,i)=>{
    const row=Math.floor(i/cols), col=i%cols;
    const cx=baseX+col*(cw+gap), cy=baseY+row*(ch+gap);
    const unlocked=i===0||save.clearedMaps.includes(i-1);
    const cleared=save.clearedMaps.includes(i);
    const hover=unlocked&&mouse.x>=cx&&mouse.x<=cx+cw&&mouse.y>=cy&&mouse.y<=cy+ch;
    ctx.fillStyle=unlocked?(hover?'#1a2244':'#0e1230'):'#0a0a15';
    ctx.strokeStyle=unlocked?(hover?m.wallCol:'#334466'):'#222233';
    ctx.lineWidth=hover?2.5:1.5;
    roundRect(cx,cy,cw,ch,8); ctx.fill(); ctx.stroke();
    // map number
    ctx.fillStyle=unlocked?'#fff':'#555'; ctx.font='bold 16px Courier New';
    ctx.fillText(`${i+1}. ${m.name}`,cx+cw/2,cy+24);
    if(unlocked){
      ctx.fillStyle='#aaa'; ctx.font='11px Courier New';
      ctx.fillText(`BOSS: ${m.bossName}`,cx+cw/2,cy+44);
      ctx.fillStyle='#88ddff';
      const dur=m.twoBoss?'10分钟':'3分钟';
      ctx.fillText(`时长${dur}  奖励${m.crystals}晶石`,cx+cw/2,cy+60);
      if(cleared){
        ctx.fillStyle='#44ff44'; ctx.font='bold 12px Courier New';
        ctx.fillText('已通关 ✓',cx+cw/2,cy+80);
      } else if(hover){
        ctx.fillStyle='#ffdd44'; ctx.font='11px Courier New';
        ctx.fillText('点击开始',cx+cw/2,cy+80);
      }
    } else {
      ctx.fillStyle='#555'; ctx.font='11px Courier New';
      ctx.fillText('通关前一关解锁',cx+cw/2,cy+50);
    }
  });
  // back button
  ctx.fillStyle='#334466'; roundRect(20,H-50,100,30,6); ctx.fill();
  ctx.fillStyle='#aaa'; ctx.font='13px Courier New'; ctx.textAlign='center';
  ctx.fillText('← 返回',70,H-30);
}

function drawGameOver(){
  ctx.fillStyle='rgba(0,0,0,0.88)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 48px Courier New'; ctx.fillStyle='#ff3344';
  ctx.shadowBlur=25; ctx.shadowColor='#ff0000';
  ctx.fillText('任务失败',W/2,180);
  ctx.shadowBlur=0;
  ctx.fillStyle='#fff'; ctx.font='20px Courier New';
  ctx.fillText(`地图: ${MAPS[selectedMapIdx].name}`,W/2,240);
  ctx.fillText(`存活时间: ${Math.floor(gameTime)}秒`,W/2,274);
  ctx.fillText(`最终分数: ${score}`,W/2,308);
  ctx.fillText(`达到等级: ${player.level}`,W/2,342);
  if(Math.floor(Date.now()/550)%2===0){
    ctx.fillStyle='#aaaacc'; ctx.font='bold 18px Courier New';
    ctx.fillText('点击返回角色选择',W/2,430);
  }
}

function drawVictory(){
  ctx.fillStyle='rgba(0,0,20,0.92)'; ctx.fillRect(0,0,W,H);
  const t=Date.now()/1000;
  ctx.save();
  for(let i=0;i<12;i++){
    const a=i/12*Math.PI*2+t*0.3;
    const len=120+Math.sin(t*2+i)*30;
    ctx.strokeStyle=`rgba(255,220,50,${0.2+Math.sin(t+i)*0.15})`;
    ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(W/2,H/2-60);
    ctx.lineTo(W/2+Math.cos(a)*len,H/2-60+Math.sin(a)*len);ctx.stroke();
  }
  ctx.restore();
  ctx.textAlign='center';
  ctx.font='bold 52px Courier New'; ctx.fillStyle='#ffdd44';
  ctx.shadowBlur=40; ctx.shadowColor='#ffaa00';
  ctx.fillText('任务完成!',W/2,180);
  ctx.shadowBlur=0;
  ctx.font='20px Courier New'; ctx.fillStyle='#aaddff';
  ctx.fillText(`${MAPS[selectedMapIdx].name} 通关!`,W/2,230);
  ctx.fillStyle='#fff'; ctx.font='18px Courier New';
  ctx.fillText(`最终分数: ${score}`,W/2,275);
  ctx.fillText(`最终等级: ${player.level}`,W/2,305);
  ctx.fillStyle='#88ddff'; ctx.font='bold 20px Courier New';
  ctx.fillText(`获得晶石: +${sessionCrystals}`,W/2,350);
  // check unlocks
  const newChar=Object.entries(CHARACTERS).find(([k,c])=>c.unlockMap===selectedMapIdx&&save.unlockedChars.includes(k));
  if(newChar){
    ctx.fillStyle='#ffaa44'; ctx.font='bold 18px Courier New';
    ctx.fillText(`解锁新角色: ${newChar[1].name}!`,W/2,390);
  }
  if(Math.floor(Date.now()/550)%2===0){
    ctx.fillStyle='#aaaacc'; ctx.font='bold 18px Courier New';
    ctx.fillText('点击返回角色选择',W/2,460);
  }
}

// ── main loop ────────────────────────────────────────────────────────
function draw(){
  ctx.clearRect(0,0,W,H);
  if(state==='title'){ drawTitle(); return; }
  if(state==='charselect'){ drawCharSelect(); return; }
  if(state==='mapselect'){ drawMapSelect(); return; }

  drawBg();
  for(const g of gems) g.draw();
  for(const p of projectiles) p.draw();
  for(const e of enemies) e.draw();
  if(state==='playing'||state==='levelup') player.draw();
  for(const p of particles) p.draw();
  drawLightning();
  for(const d of damageNums){
    const sx=d.x-camera.x, sy=d.y-camera.y;
    ctx.save(); ctx.globalAlpha=clamp(d.life/d.maxL,0,1);
    ctx.fillStyle='#ffee22'; ctx.font='bold 13px Courier New'; ctx.textAlign='center';
    ctx.fillText(d.v,sx,sy); ctx.restore();
  }
  drawHUD();
  drawBossBar();
  drawRoundBanner();
  if(state==='levelup') drawLevelUpScreen();
  if(state==='gameover') drawGameOver();
  if(state==='victory') drawVictory();
}

function loop(ts){
  const dt=Math.min((ts-lastTime)/1000,.05);
  lastTime=ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}

state='title';
lastTime=performance.now();
requestAnimationFrame(loop);
</script>
</body>
